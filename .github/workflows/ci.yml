name: CI

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov

    - name: Run tests with coverage
      run: |
        pytest tests/ -v --cov=todo_core --cov-report=term --cov-fail-under=80

    - name: Build Docker image
      run: |
        docker build -t todo-list-web .

  build-exe:
    runs-on: windows-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build CLI executable
      run: |
        pyinstaller --onefile todo.py

    - name: Build Web executable
      run: |
        pyinstaller --onefile --console web_app.py

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: todo-app-executables
        path: dist/*.exe

  release:
    runs-on: ubuntu-latest
    needs: build-exe
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: todo-app-executables
        path: artifacts/

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/*.exe
        generate_release_notes: true