<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        .add-form {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .add-form input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        .add-form input:focus {
            outline: none;
            border-color: #667eea;
        }

        .add-form button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        .add-form button:hover {
            opacity: 0.9;
        }

        .task-list {
            list-style: none;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .task-status {
            width: 24px;
            height: 24px;
            margin-right: 12px;
            cursor: pointer;
            font-size: 20px;
            background: none;
            border: none;
        }

        .task-text {
            flex: 1;
            font-size: 16px;
        }

        .task-text.completed {
            text-decoration: line-through;
            color: #888;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        .delete-btn:hover {
            background: #c82333;
        }

        .empty {
            text-align: center;
            color: #888;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Todo List</h1>

        <form class="add-form" action="/add" method="post">
            <input type="text" name="title" placeholder="Новая задача..." required>
            <button type="submit">Добавить</button>
        </form>

        {% if tasks %}
            <ul class="task-list">
                {% for task in tasks %}
                <li class="task-item">
                    <form action="/complete/{{ loop.index0 }}" method="post" style="margin:0">
                        <button type="submit" class="task-status">
                            {% if task.completed %}✅{% else %}⭕{% endif %}
                        </button>
                    </form>
                    <span class="task-text {% if task.completed %}completed{% endif %}">{{ task.text }}</span>
                    <form action="/delete/{{ loop.index0 }}" method="post" style="margin:0">
                        <button type="submit" class="delete-btn">🗑️</button>
                    </form>
                </li>
                {% endfor %}
            </ul>
        {% else %}
            <div class="empty">
                📭 Нет задач. Добавьте первую!
            </div>
        {% endif %}
    </div>
</body>
</html>
